    </div>

    <!-- Invoices Section -->
    <div id="section-invoices" class="portal-section portal-section--active">
      <div id="invoices-table-wrap" class="portal-table-wrap">

          <thead>
            <tr>
              <th>N°</th>
              <th>Libellé</th>
              <th>Date</th>
              <th>Montant HT</th>
              <th>Montant TTC</th>
              <th>Statut</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="invoices-tbody"></tbody>
        </table>
      </div>
      <div id="invoices-empty" class="portal-empty" style="display:none;">
        <div class="portal-empty__icon">&#128196;</div>
        <p>Aucune facture pour le moment.</p>
      </div>
    </div>

    <!-- Contracts Section -->
    <div id="section-contracts" class="portal-section">
      <div id="contracts-table-wrap" class="portal-table-wrap">
        <table class="portal-table">
          <thead>
            <tr>
              <th>Titre</th>
              <th>Description</th>
              <th>Date de signature</th>
              <th>Statut</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="contracts-tbody"></tbody>
        </table>
      </div>
      <div id="contracts-empty" class="portal-empty" style="display:none;">
        <div class="portal-empty__icon">&#128221;</div>
        <p>Aucun contrat pour le moment.</p>
      </div>
    </div>
